name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  validate-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: tag $TAG_VERSION != package.json $PKG_VERSION"
            exit 1
          fi

  build:
    needs: validate-tag
    if: |
      always() &&
      (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install native deps
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Build MSI
        run: npx electron-builder --win msi --publish never

      - name: Generate latest.yml
        run: node scripts/generate-latest-yml.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: release/*.msi
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.msi
            release/latest.yml
          draft: false
          prerelease: false
